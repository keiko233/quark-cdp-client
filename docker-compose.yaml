services:
  quark-docker:
    image: ghcr.io/keiko233/quark-docker:latest
    container_name: quark-docker
    hostname: quark-docker
    networks:
      - quark-network

    # ports:
    #   - "5900:5900"
    #   - "${REMOTE_DEBUGGING_PORT:-9222}:9223"

    volumes:
      - ./wine-data:/opt/spark-bottle/drive_c/users/wineuser/Application Data/quark-cloud-drive
      - ./downloads:/opt/spark-bottle/drive_c/users/wineuser/Downloads

    security_opt:
      - seccomp:unconfined

    cpus: "${DOCKER_CPUS:-2.0}"
    mem_limit: "${DOCKER_MEMORY:-4g}"
    shm_size: "2gb"

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:9222/json/version >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

    restart: unless-stopped

  quark-cdp-client:
    build: .
    image: ghcr.io/keiko233/quark-cdp-client:latest
    container_name: quark-cdp-client
    networks:
      - quark-network

    environment:
      CDP_URL: http://127.0.0.1:${CDP_FORWARD_LOCAL_PORT:-9222}
      CDP_FORWARD_HOST: ${CDP_FORWARD_HOST:-quark-docker}
      CDP_FORWARD_PORT: ${CDP_FORWARD_PORT:-9222}
      CDP_FORWARD_LOCAL_PORT: ${CDP_FORWARD_LOCAL_PORT:-9222}

    depends_on:
      quark-docker:
        condition: service_healthy

    ports:
      - "3000:3000"

    security_opt:
      - seccomp:unconfined

    restart: unless-stopped

networks:
  quark-network:
    driver: bridge